<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1" />
  <title>Zelvop — Delivery Confirmation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 393px; height: 852px; overflow: hidden; background: #fff; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  </style>
</head>
<body>
<div style="width:393px; height:852px; background:#fff; border-radius:2px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; position:relative">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 24px 0; position:absolute; top:0; left:0; right:0; z-index:10">
      <span style="font-family:'Inter',sans-serif; font-size:15px; font-weight:600; color:#1F2937">9:41</span>
      <div style="display:flex; gap:6px; align-items:center">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1F2937"/><rect x="5" y="2" width="3" height="10" rx="1" fill="#1F2937"/><rect x="10" y="0" width="3" height="12" rx="1" fill="#1F2937"/><rect x="15" y="1" width="3" height="11" rx="1" fill="#D1D5DB"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 8.5C3.7 4.8 7.5 3 11.5 3s5.5 1.5 7.5 4" stroke="#1F2937" stroke-width="1.5" fill="none"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0" y="0" width="24" height="12" rx="3.5" stroke="#1F2937" stroke-width="1" fill="none"/><rect x="1.5" y="1.5" width="18" height="9" rx="2" fill="#1F2937"/><rect x="25" y="3.5" width="2" height="5" rx="1" fill="#1F2937"/></svg>
      </div>
    </div>
    <div style="width:100%; height:100%; display:flex; flex-direction:column; font-family:'Inter',sans-serif">
      <div style="display:flex; align-items:center; gap:12px; padding:58px 16px 12px; background:#fff">
        <div style="width:40px; height:40px; border-radius:20px; background:#F3F4F6; display:flex; align-items:center; justify-content:center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <span style="font-size:18px; font-weight:700; color:#1F2937">Confirm Delivery</span>
      </div>
      <div style="flex:1; overflow-y:auto; padding:16px 24px">
        <div style="font-size:14px; color:#6B7280; margin-bottom:24px">Order #ORD-0042 — Usman Ali</div>
        <!-- Photo area -->
        <div style="margin-bottom:20px">
          <div style="font-size:14px; font-weight:600; color:#1F2937; margin-bottom:10px">Delivery Photo</div>
          <div style="width:100%; height:160px; border-radius:14px; border:2px dashed #D1D5DB; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:#FAFAFA">
            <div style="width:52px; height:52px; border-radius:26px; background:#EFF6FF; display:flex; align-items:center; justify-content:center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <span style="font-size:14px; font-weight:600; color:#3B82F6">Take delivery photo</span>
            <span style="font-size:12px; color:#9CA3AF">Tap to open camera</span>
          </div>
          <div style="text-align:center; margin-top:8px; font-size:13px; color:#9CA3AF">Photo is optional</div>
        </div>
        <!-- Notes -->
        <div style="margin-bottom:20px">
          <div style="font-size:14px; font-weight:600; color:#1F2937; margin-bottom:10px">Delivery Notes</div>
          <div style="width:100%; height:80px; border:1.5px solid #E5E7EB; border-radius:12px; padding:12px 14px; font-size:14px; color:#9CA3AF; background:#F9FAFB; box-sizing:border-box">e.g., Left at door, handed to security guard</div>
        </div>
        <!-- Cash -->
        <div style="background:#FEF3C7; border-radius:14px; padding:16px; margin-bottom:20px">
          <div style="font-size:14px; font-weight:700; color:#92400E; margin-bottom:10px">Cash Collection</div>
          <div style="font-size:20px; font-weight:800; color:#92400E; margin-bottom:12px">Rs. 1,450</div>
          <div style="display:flex; align-items:center; gap:10px">
            <div style="width:24px; height:24px; border-radius:6px; border:2px solid #D97706; display:flex; align-items:center; justify-content:center"></div>
            <span style="font-size:14px; font-weight:600; color:#92400E">I collected the payment</span>
          </div>
        </div>
      </div>
      <!-- Confirm -->
      <div style="padding:16px 24px 36px; background:#fff; border-top:1px solid #E5E7EB">
        <div style="height:52px; background:#10B981; border-radius:12px; display:flex; align-items:center; justify-content:center">
          <span style="color:#fff; font-size:16px; font-weight:700">Confirm Delivery</span>
        </div>
        <div style="text-align:center; margin-top:12px; font-size:14px; color:#6B7280">Cancel</div>
      </div>
    </div>
    <div style="position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; border-radius:3px; background:#1F2937; opacity:0.2"></div>
  </div>
</body>
</html>
