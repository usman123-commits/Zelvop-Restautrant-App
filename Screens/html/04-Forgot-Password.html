<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1" />
  <title>Zelvop — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 393px; height: 852px; overflow: hidden; background: #fff; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  </style>
</head>
<body>
<div style="width:393px; height:852px; background:#fff; border-radius:2px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; position:relative">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 24px 0; position:absolute; top:0; left:0; right:0; z-index:10">
      <span style="font-family:'Inter',sans-serif; font-size:15px; font-weight:600; color:#1F2937">9:41</span>
      <div style="display:flex; gap:6px; align-items:center">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1F2937"/><rect x="5" y="2" width="3" height="10" rx="1" fill="#1F2937"/><rect x="10" y="0" width="3" height="12" rx="1" fill="#1F2937"/><rect x="15" y="1" width="3" height="11" rx="1" fill="#D1D5DB"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 8.5C3.7 4.8 7.5 3 11.5 3s5.5 1.5 7.5 4" stroke="#1F2937" stroke-width="1.5" fill="none"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0" y="0" width="24" height="12" rx="3.5" stroke="#1F2937" stroke-width="1" fill="none"/><rect x="1.5" y="1.5" width="18" height="9" rx="2" fill="#1F2937"/><rect x="25" y="3.5" width="2" height="5" rx="1" fill="#1F2937"/></svg>
      </div>
    </div>
    <div style="width:100%; height:100%; display:flex; flex-direction:column; font-family:'Inter',sans-serif">
      <!-- Back + Title -->
      <div style="display:flex; align-items:center; gap:12px; padding:58px 16px 12px">
        <div style="width:40px; height:40px; border-radius:20px; background:#F3F4F6; display:flex; align-items:center; justify-content:center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <span style="font-size:18px; font-weight:700; color:#1F2937">Reset Password</span>
      </div>
      <div style="flex:1; padding:32px 24px; display:flex; flex-direction:column">
        <div style="width:64px; height:64px; border-radius:32px; background:#EFF6FF; display:flex; align-items:center; justify-content:center; margin-bottom:20px">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div style="font-size:15px; color:#6B7280; line-height:1.5; margin-bottom:28px">Enter your email address and we'll send you a reset link</div>
        <div style="width:100%; margin-bottom:20px">
          <div style="display:flex; align-items:center; background:#F9FAFB; border:1.5px solid #E5E7EB; border-radius:12px; padding:0 14px; height:52px">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span style="margin-left:12px; font-size:15px; color:#9CA3AF">Email address</span>
          </div>
        </div>
        <div style="width:100%; height:52px; background:#3B82F6; border-radius:12px; display:flex; align-items:center; justify-content:center">
          <span style="color:#fff; font-size:16px; font-weight:700">Send Reset Link</span>
        </div>
        <div style="text-align:center; margin-top:20px; font-size:14px; color:#3B82F6; font-weight:600">Back to Login</div>
      </div>
    </div>
    <div style="position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; border-radius:3px; background:#1F2937; opacity:0.2"></div>
  </div>
</body>
</html>
