<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1" />
  <title>Zelvop — Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 393px; height: 852px; overflow: hidden; background: #fff; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  </style>
</head>
<body>
<div style="width:393px; height:852px; background:#F9FAFB; border-radius:2px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; position:relative">
    <div style="background:#fff; padding:14px 24px 0; display:flex; justify-content:space-between; align-items:center; position:absolute; top:0; left:0; right:0; z-index:10">
      <span style="font-family:'Inter',sans-serif; font-size:15px; font-weight:600; color:#1F2937">9:41</span>
      <div style="display:flex; gap:6px; align-items:center">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1F2937"/><rect x="5" y="2" width="3" height="10" rx="1" fill="#1F2937"/><rect x="10" y="0" width="3" height="12" rx="1" fill="#1F2937"/><rect x="15" y="1" width="3" height="11" rx="1" fill="#D1D5DB"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 8.5C3.7 4.8 7.5 3 11.5 3s5.5 1.5 7.5 4" stroke="#1F2937" stroke-width="1.5" fill="none"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0" y="0" width="24" height="12" rx="3.5" stroke="#1F2937" stroke-width="1" fill="none"/><rect x="1.5" y="1.5" width="18" height="9" rx="2" fill="#1F2937"/><rect x="25" y="3.5" width="2" height="5" rx="1" fill="#1F2937"/></svg>
      </div>
    </div>
    <div style="width:100%; height:100%; display:flex; flex-direction:column; font-family:'Inter',sans-serif">
      <div style="background:#fff; padding:58px 20px 0">
        <div style="font-size:24px; font-weight:800; color:#1F2937; margin-bottom:16px">Orders</div>
        <div style="display:flex; gap:6px; padding-bottom:16px">
          <div style="padding:7px 14px; border-radius:20px; background:#F3F4F6; color:#6B7280; font-size:13px; font-weight:600">Active</div>
          <div style="padding:7px 14px; border-radius:20px; background:#3B82F6; color:#fff; font-size:13px; font-weight:600">New</div>
          <div style="padding:7px 14px; border-radius:20px; background:#F3F4F6; color:#6B7280; font-size:13px; font-weight:600">Completed</div>
          <div style="padding:7px 14px; border-radius:20px; background:#F3F4F6; color:#6B7280; font-size:13px; font-weight:600">All</div>
        </div>
      </div>
      <div style="flex:1; overflow-y:auto; padding:12px 20px">
        <!-- New order card -->
        <div style="background:#fff; border-radius:14px; padding:16px; margin-bottom:12px; border:1px solid #F3F4F6">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px">
            <span style="font-size:15px; font-weight:700; color:#1F2937">#ORD-0043</span>
            <span style="background:#FEF3C7; color:#92400E; font-size:13px; font-weight:600; padding:5px 14px; border-radius:20px">New</span>
          </div>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px">
            <div style="display:flex; align-items:center; gap:8px">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span style="font-size:14px; font-weight:600; color:#1F2937">Sara Ahmed</span>
            </div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72"/></svg>
          </div>
          <div style="display:flex; align-items:flex-start; gap:8px; margin-bottom:10px">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" style="flex-shrink:0; margin-top:1px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span style="font-size:13px; color:#6B7280; line-height:1.4">Apt 4B, Al-Rehman Garden, Johar Town</span>
          </div>
          <div style="font-size:13px; color:#6B7280; margin-bottom:12px; display:flex; align-items:center; gap:6px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/></svg>
            2 items — Rs. 750
          </div>
          <div style="display:flex; align-items:center; justify-content:space-between; padding-top:10px; border-top:1px solid #F3F4F6">
            <span style="font-size:12px; font-weight:600; padding:3px 10px; border-radius:8px; background:#D1FAE5; color:#065F46">Prepaid</span>
            <span style="font-size:12px; color:#6B7280">Ready in ~15 min</span>
            <span style="font-size:12px; color:#9CA3AF">2m ago</span>
          </div>
          <div style="display:flex; gap:10px; margin-top:14px">
            <div style="flex:1; height:44px; background:#10B981; border-radius:10px; display:flex; align-items:center; justify-content:center">
              <span style="color:#fff; font-size:14px; font-weight:700">Accept</span>
            </div>
            <div style="flex:1; height:44px; border:2px solid #EF4444; border-radius:10px; display:flex; align-items:center; justify-content:center">
              <span style="color:#EF4444; font-size:14px; font-weight:700">Decline</span>
            </div>
          </div>
        </div>
      </div>
      <!-- Spacer -->
      <div style="height:83px; flex-shrink:0"></div>
    </div>
    <!-- Tab bar -->
    <div style="position:absolute; bottom:0; left:0; right:0; height:83px; background:#fff; border-top:1px solid #E5E7EB; display:flex; align-items:flex-start; justify-content:space-around; padding-top:8px; padding-bottom:28px">
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span style="font-size:11px; font-weight:500; color:#9CA3AF">Home</span>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span style="font-size:11px; font-weight:600; color:#3B82F6">Orders</span>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span style="font-size:11px; font-weight:500; color:#9CA3AF">Alerts</span>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span style="font-size:11px; font-weight:500; color:#9CA3AF">Profile</span>
      </div>
    </div>
  </div>
</body>
</html>
