<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1" />
  <title>Zelvop — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 393px; height: 852px; overflow: hidden; background: #fff; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  </style>
</head>
<body>
<div style="width:393px; height:852px; background:#fff; border-radius:2px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; position:relative">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 24px 0; position:absolute; top:0; left:0; right:0; z-index:10">
      <span style="font-family:'Inter',sans-serif; font-size:15px; font-weight:600; color:#1F2937">9:41</span>
      <div style="display:flex; gap:6px; align-items:center">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1F2937"/><rect x="5" y="2" width="3" height="10" rx="1" fill="#1F2937"/><rect x="10" y="0" width="3" height="12" rx="1" fill="#1F2937"/><rect x="15" y="1" width="3" height="11" rx="1" fill="#D1D5DB"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 8.5C3.7 4.8 7.5 3 11.5 3s5.5 1.5 7.5 4" stroke="#1F2937" stroke-width="1.5" fill="none"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0" y="0" width="24" height="12" rx="3.5" stroke="#1F2937" stroke-width="1" fill="none"/><rect x="1.5" y="1.5" width="18" height="9" rx="2" fill="#1F2937"/><rect x="25" y="3.5" width="2" height="5" rx="1" fill="#1F2937"/></svg>
      </div>
    </div>
    <div style="width:100%; height:100%; display:flex; flex-direction:column; font-family:'Inter',sans-serif">
      <div style="flex:1; overflow-y:auto; display:flex; flex-direction:column; align-items:center; padding:60px 24px 24px">
        <div style="width:48px; height:48px; border-radius:10px; background:#3B82F6; display:flex; align-items:center; justify-content:center">
          <span style="color:#fff; font-size:26px; font-weight:800">Z</span>
        </div>
        <div style="margin-top:10px; font-size:22px; font-weight:800; color:#1F2937">Create Account</div>
        <div style="margin-top:4px; font-size:14px; color:#6B7280; margin-bottom:28px">Join as a delivery rider</div>
        <!-- Full Name -->
        <div style="width:100%; margin-bottom:14px">
          <div style="display:flex; align-items:center; background:#F9FAFB; border:1.5px solid #E5E7EB; border-radius:12px; padding:0 14px; height:52px">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span style="margin-left:12px; font-size:15px; color:#9CA3AF">Full Name</span>
          </div>
        </div>
        <!-- Email -->
        <div style="width:100%; margin-bottom:14px">
          <div style="display:flex; align-items:center; background:#F9FAFB; border:1.5px solid #E5E7EB; border-radius:12px; padding:0 14px; height:52px">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span style="margin-left:12px; font-size:15px; color:#9CA3AF">Email address</span>
          </div>
        </div>
        <!-- Phone -->
        <div style="width:100%; margin-bottom:14px">
          <div style="display:flex; align-items:center; background:#F9FAFB; border:1.5px solid #E5E7EB; border-radius:12px; padding:0 14px; height:52px">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72"/></svg>
            <span style="margin-left:12px; font-size:15px; color:#9CA3AF">Phone Number</span>
          </div>
        </div>
        <!-- Password -->
        <div style="width:100%; margin-bottom:14px">
          <div style="display:flex; align-items:center; background:#F9FAFB; border:1.5px solid #E5E7EB; border-radius:12px; padding:0 14px; height:52px">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <span style="margin-left:12px; font-size:15px; color:#9CA3AF; flex:1">Password</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
        </div>
        <!-- Confirm Password -->
        <div style="width:100%; margin-bottom:14px">
          <div style="display:flex; align-items:center; background:#F9FAFB; border:1.5px solid #E5E7EB; border-radius:12px; padding:0 14px; height:52px">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <span style="margin-left:12px; font-size:15px; color:#9CA3AF; flex:1">Confirm Password</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
        </div>
        <!-- Sign Up button -->
        <div style="width:100%; height:52px; background:#3B82F6; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-top:8px">
          <span style="color:#fff; font-size:16px; font-weight:700">Sign Up</span>
        </div>
      </div>
      <div style="padding:16px 0 40px; text-align:center">
        <span style="font-size:14px; color:#6B7280">Already have an account? </span>
        <span style="font-size:14px; color:#3B82F6; font-weight:600">Login</span>
      </div>
    </div>
    <div style="position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; border-radius:3px; background:#1F2937; opacity:0.2"></div>
